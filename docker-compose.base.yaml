services:
  api:
    build: .
    restart: on-failure
    container_name: api
    command: ["prodik", "api", "run"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prodik-network

  keycloak:
    command: ["start-dev", "--import-realm"]
    image: keycloak/keycloak:latest
    networks:
      prodik-network:
        aliases:
          - credentials.literally.io
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin_password
    volumes:
      - "./deploy/keycloak.json:/opt/keycloak/data/import/realm.json"
    ports:
      - 8080:8080

  rustfs:
    image: rustfs/rustfs:latest
    networks:
      prodik-network:
        aliases:
          - files.literally.io
    volumes:
      - rustfs-data:/data
    env_file:
      - "./deploy/rustfs.env"
    ports:
      - 9000:9000
      - 9001:9001

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus-data:/prometheus
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      prodik-network:
        aliases:
          - metrics.literally.io
  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: always
    command: redis-server --save 60 1 --loglevel warning --requirepass your_cache_password
    volumes:
      - redis-data:/data
    networks:
      prodik-network:
        aliases:
          - cache.literally.io

  grafana:
    image: grafana/grafana:latest
    ports:
      - 3000:3000
    networks:
      - prodik-network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin_password
    volumes:
      - grafana-data:/var/lib/grafana

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      prodik-network:
        aliases:
          - persistence.literally.io
    env_file:
      - "./deploy/postgres.env"

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    expose:
      - 9100
    networks:
      - prodik-network

  nginx:
    image: nginx:latest
    ports:
      - 80:80
    networks:
      prodik-network:
        aliases:
          - literally.io
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

volumes:
  redis-data:
  prometheus-data:
  grafana-data:
  postgres-data:
  rustfs-data:

networks:
  prodik-network:
    driver: bridge