services:
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus-data:/prometheus
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      prodik-network:
        aliases:
          - metrics.literally.io

  keycloak:
    command: ["start-dev"]
    image: keycloak/keycloak:latest
    networks:
      prodik-network:
        aliases:
          - auth.literally.io
    ports:
      - 8080:8080

  rustfs:
    image: rustfs/rustfs:latest
    environment:
      
    networks:
      prodik-network:
        aliases:
          - objstor.literally.io
    volumes:
      - rustfs-data:/data

  grafana:
    image: grafana/grafana:latest
    ports:
      - 3000:3000
    networks:
      - prodik-network
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin_password
    volumes:
      - grafana-data:/var/lib/grafana

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      prodik-network:
        aliases:
          - persistence.literally.io
    env_file:
      - "./deploy/postgres.env"

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - 9100
    networks:
      - prodik-network

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - 80:80
    networks:
      prodik-network:
        aliases:
          - literally.io
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api

  api:
    build: .
    restart: on-failure
    container_name: api
    command: ["prodik", "api", "run"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      prodik-network:

volumes:
  prometheus-data:
  grafana-data:
  postgres-data:

networks:
  prodik-network:
    driver: bridge